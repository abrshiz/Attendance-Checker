name: qr_app
description: A QR Code Attendance Management System
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  permission_handler: ^11.3.1
  gal: ^2.3.0
  intl: ^0.19.0
  share_plus: ^10.0.0
  uuid: ^4.3.3

  # Database with desktop support
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0+4
  path_provider: ^2.1.0
  path: ^1.9.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # For changing app icon

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
flutter_launcher_icons:
  android: true
  ios: false # Set to true if you have iOS
  linux: true
  windows: false # Set to true if you have Windows
  macos: false # Set to true if you have macOS
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#ffffff" # Background color for Android adaptive icon
  adaptive_icon_foreground: "assets/icons/app_icon.png" # Foreground image for Android
  min_sdk_android: 21
